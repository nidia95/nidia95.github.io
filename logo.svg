<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 50" width="100%" height="100%">
  <defs>
    <style>
      /* Importing a beautiful, clean monospace font for developers */
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&amp;display=swap');
      
      .font-code { 
        font-family: 'JetBrains Mono', monospace; 
      }

      /* Using your exact color palette */
      .accent-primary { fill: #bd866a; }
      .accent-secondary { fill: #89685f; }
      .text-dark { fill: #4f494c; }

      /* Animation for the opening and closing brackets sliding outward */
      .bracket-left {
        opacity: 0;
        transform: translateX(15px);
        animation: slideLeft 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
      }
      
      .bracket-right {
        opacity: 0;
        transform: translateX(-15px);
        animation: slideRight 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
      }

      /* Animation for ND drawing its outline then filling with your primary accent */
      .nd-text {
        opacity: 0;
        fill: transparent;
        stroke: #bd866a; /* --accent-primary */
        stroke-width: 1.2;
        stroke-dasharray: 120;
        stroke-dashoffset: 120;
        animation: 
          revealND 0.1s linear 0.7s forwards,
          drawND 1.5s ease-in-out 0.7s forwards,
          fillND 0.8s ease-in-out 2.2s forwards;
      }

      /* Terminal typing cursor */
      .cursor {
        opacity: 0;
        animation: blink 1.2s step-end infinite 1.5s;
      }

      /* A subtle underline representing an active code editor line */
      .underline {
        opacity: 0;
        stroke: #89685f; /* --accent-secondary */
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: drawUnderline 1s cubic-bezier(0.16, 1, 0.3, 1) 2.5s forwards;
      }

      /* Keyframes */
      @keyframes slideLeft { to { transform: translateX(0); opacity: 1; } }
      @keyframes slideRight { to { transform: translateX(0); opacity: 1; } }
      @keyframes revealND { to { opacity: 1; } }
      @keyframes drawND { to { stroke-dashoffset: 0; } }
      @keyframes fillND { to { fill: #bd866a; stroke-width: 0; } }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes drawUnderline { to { stroke-dashoffset: 0; opacity: 0.25; } }
    </style>
  </defs>

  <!-- Centered Grouping -->
  <g transform="translate(62, 25)" class="font-code" text-anchor="middle" dominant-baseline="middle">
    
    <!-- Subtle Animated Editor Line Underneath -->
    <line x1="-31" y1="18" x2="68" y2="18" class="underline" />

    <!-- Left Bracket: < -->
    <g class="bracket-left">
      <text x="-31" y="0" font-size="24" font-weight="500" class="accent-secondary">&lt;</text>
    </g>
    
    <!-- Central Initials: ND -->
    <text x="0" y="0" font-size="28" font-weight="800" class="nd-text">ND</text>
    
    <!-- Right Bracket: /> -->
    <g class="bracket-right">
      <text x="40" y="0" font-size="24" font-weight="500" class="accent-secondary">/&gt;</text>
    </g>
    
    <!-- Blinking Cursor: _ -->
    <g class="cursor">
      <text x="68" y="0" font-size="28" font-weight="800" class="text-dark">_</text>
    </g>
    
  </g>
</svg>